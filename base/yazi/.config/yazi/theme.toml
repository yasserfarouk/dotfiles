# theme.toml — overrides on top of the active flavor
"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

[flavor]
dark  = "tokyo-night"
light = "tokyo-night"

[status]
separator_open  = ""
separator_close = ""

[filetype]
rules = [
    # Shell scripts — green (must come before exec rule, since scripts are also executable)
    { mime = "text/x-shellscript",          fg = "#9ece6a" },
    { mime = "application/x-sh",            fg = "#9ece6a" },
    { url  = "*.{sh,bash,zsh,fish,ksh,csh}", fg = "#9ece6a" },

    # Executables / compiled binaries — red
    { url = "*", is = "exec", fg = "#f7768e" },

    # Markup & prose — teal
    { mime = "text/markdown",               fg = "#73daca" },
    { mime = "text/x-tex",                  fg = "#73daca" },
    { mime = "text/x-org",                  fg = "#73daca" },
    { mime = "text/x-rst",                  fg = "#73daca" },
    { url  = "*.{md,mdx,markdown}",         fg = "#73daca" },
    { url  = "*.{tex,sty,cls,bib}",         fg = "#73daca" },
    { url  = "*.{org,rst,typ,typst}",       fg = "#73daca" },

    # Images — yellow
    { mime = "image/*", fg = "#e0af68" },

    # Video — purple
    { mime = "video/*", fg = "#bb9af7" },

    # Audio — softer purple
    { mime = "audio/*", fg = "#9d7cd8" },

    # Archives & compressed — orange
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#ff9e64" },

    # Data & config — cyan
    { mime = "application/{json,ndjson}",   fg = "#2ac3de" },
    { mime = "text/{xml,csv}",              fg = "#2ac3de" },
    { url  = "*.{json,json5,jsonc,yaml,yml,toml,xml,csv,tsv}", fg = "#2ac3de" },

    # PDF & office docs — warm red
    { mime = "application/pdf",             fg = "#db4b4b" },
    { mime = "application/msword",                            fg = "#db4b4b" },
    { mime = "application/vnd.ms-excel",                      fg = "#db4b4b" },
    { mime = "application/vnd.ms-powerpoint",                 fg = "#db4b4b" },
    { mime = "application/vnd.openxmlformats-officedocument.*", fg = "#db4b4b" },
    { mime = "application/vnd.oasis.opendocument.*",          fg = "#db4b4b" },

    # Symlinks — cyan italic
    { url = "*", is = "link", fg = "#2ac3de", italic = true },

    # Broken symlinks — red bold
    { url = "*", is = "orphan", fg = "#f7768e", bold = true },

    # Directories — default blue (let flavor handle, but explicit fallback)
    { url = "*/", fg = "#7aa2f7" },
]
