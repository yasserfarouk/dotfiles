# Tokyo Night flavor for Yazi
# Colors based on https://github.com/folke/tokyonight.nvim (night variant)

# : Manager {{{

[mgr]
cwd = { fg = "#7dcfff" }

# Find
find_keyword  = { fg = "#e0af68", bold = true, italic = true, underline = true }
find_position = { fg = "#bb9af7", bg = "reset", bold = true, italic = true }

# Marker
marker_copied   = { fg = "#9ece6a", bg = "#9ece6a" }
marker_cut      = { fg = "#f7768e", bg = "#f7768e" }
marker_marked   = { fg = "#7dcfff", bg = "#7dcfff" }
marker_selected = { fg = "#e0af68", bg = "#e0af68" }

# Count
count_copied   = { fg = "#1a1b26", bg = "#9ece6a" }
count_cut      = { fg = "#1a1b26", bg = "#f7768e" }
count_selected = { fg = "#1a1b26", bg = "#e0af68" }

# Border
border_symbol = "│"
border_style  = { fg = "#3b4261" }

# : }}}


# : Tabs {{{

[tabs]
active   = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
inactive = { fg = "#7aa2f7", bg = "#292e42" }

# : }}}


# : Mode {{{

[mode]

normal_main = { fg = "#1a1b26", bg = "#7aa2f7", bold = true }
normal_alt  = { fg = "#7aa2f7", bg = "#292e42" }

# Select mode
select_main = { fg = "#1a1b26", bg = "#9ece6a", bold = true }
select_alt  = { fg = "#9ece6a", bg = "#292e42" }

# Unset mode
unset_main = { fg = "#1a1b26", bg = "#ff9e64", bold = true }
unset_alt  = { fg = "#ff9e64", bg = "#292e42" }

# : }}}


# : Status bar {{{

[status]
# Permissions
perm_sep   = { fg = "#3b4261" }
perm_type  = { fg = "#bb9af7" }
perm_read  = { fg = "#e0af68" }
perm_write = { fg = "#f7768e" }
perm_exec  = { fg = "#9ece6a" }

# Progress
progress_label  = { fg = "#c0caf5", bold = true }
progress_normal = { fg = "#9ece6a", bg = "#3b4261" }
progress_error  = { fg = "#e0af68", bg = "#f7768e" }

# : }}}


# : Pick {{{

[pick]
border   = { fg = "#7aa2f7" }
active   = { fg = "#bb9af7", bold = true }
inactive = {}

# : }}}


# : Input {{{

[input]
border   = { fg = "#7aa2f7" }
title    = {}
value    = {}
selected = { reversed = true }

# : }}}


# : Completion {{{

[cmp]
border = { fg = "#7aa2f7" }

# : }}}


# : Tasks {{{

[tasks]
border  = { fg = "#7aa2f7" }
title   = {}
hovered = { fg = "#bb9af7", bold = true }

# : }}}


# : Which {{{

[which]
mask            = { bg = "#292e42" }
cand            = { fg = "#7dcfff" }
rest            = { fg = "#565f89" }
desc            = { fg = "#bb9af7" }
separator       = "  "
separator_style = { fg = "#414868" }

# : }}}


# : Help {{{

[help]
on      = { fg = "#7dcfff" }
run     = { fg = "#bb9af7" }
hovered = { reversed = true, bold = true }
footer  = { fg = "#292e42", bg = "#c0caf5" }

# : }}}


# : Spotter {{{

[spot]
border   = { fg = "#7aa2f7" }
title    = { fg = "#7aa2f7" }
tbl_col  = { fg = "#7dcfff" }
tbl_cell = { fg = "#bb9af7", bg = "#3b4261" }

# : }}}


# : Notification {{{

[notify]
title_info  = { fg = "#9ece6a" }
title_warn  = { fg = "#e0af68" }
title_error = { fg = "#f7768e" }

# : }}}


# : File-specific styles {{{

[filetype]

rules = [
	# Image
	{ mime = "image/*", fg = "#7dcfff" },
	# Media
	{ mime = "{audio,video}/*", fg = "#e0af68" },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#bb9af7" },
	# Document
	{ mime = "application/{pdf,doc,rtf}", fg = "#73daca" },
	# Virtual file system
	{ mime = "vfs/{absent,stale}", fg = "#565f89" },
	# Fallback
	{ url = "*", fg = "#c0caf5" },
	{ url = "*/", fg = "#7aa2f7" },
]

# : }}}
